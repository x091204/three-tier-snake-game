apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-backend-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - three-tier-dev
  selector:
    matchLabels:
      monitoring: enabled

  endpoints:
    - port: http
      path: /metrics
      interval: 15s